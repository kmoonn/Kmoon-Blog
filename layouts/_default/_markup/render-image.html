{{ $isHomeHero := and $.Page.IsHome (eq .Destination "/images/flowers.gif") }}
{{ $imageID := printf "img-%s" (substr (md5 .Destination) 0 8) }}
{{ $zoomLabel := "放大图片" }}
{{ with .Text }}
  {{ $zoomLabel = printf "放大图片：%s" . }}
{{ end }}
<figure
    class="image-caption{{ if and $.Page.Site.Params.imageZoom (not $isHomeHero) }} image-zoom-container{{ end }}{{ if $isHomeHero }} home-hero-image{{ end }}"
>
    {{ if and $.Page.Site.Params.imageZoom (not $isHomeHero) }}
    <input
        type="checkbox"
        id="{{ $imageID }}"
        class="image-zoom-toggle"
        aria-label="{{ $zoomLabel }}"
    />
    <label
        for="{{ $imageID }}"
        class="image-zoom-label"
    >
        <img
            src="{{ .Destination | safeURL }}"
            alt="{{ .Text }}"
            loading="lazy"
            class="zoomable-image"
        />
    </label>
    <!-- 添加overlay元素用于显示放大的图片 -->
    <label
        for="{{ $imageID }}"
        class="image-zoom-overlay"
    >
        <img
            src="{{ .Destination | safeURL }}"
            alt="{{ .Text }}"
            class="zoomable-image"
        />
    </label>
    {{ else }}
    <img src="{{ .Destination | safeURL }}" alt="{{ .Text }}" loading="{{ if $isHomeHero }}eager{{ else }}lazy{{ end }}" />
    {{ end }}
    {{ with .Text }}<figcaption>{{ . }}</figcaption>{{ end }}
</figure>

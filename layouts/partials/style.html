<style>
    /* theme */
    :root {
        --width-max: 720px;
        --font-primary: Verdana, sans-serif;
        --font-secondary: monospace;
        --font-size-primary: 1em;
        --font-size-secondary: 0.8em;
        --bg-color-primary: #fdfdfd;
        --bg-color-secondary: #f2f4f7;
        --text-color-primary: #1a1a1a;
        --text-color-secondary: #444;
        --text-color-tertiary: #8c8c8c;
        --link-color: #0066cc;
        --link-visited-color: #551a8b;
        --border-color: #d0d7de;
        --upvoted-color: #fa8072;
        --code-bg: #f6f8fa;
        --code-inline-bg: #eff1f3;
        --code-inline-text: #1f2328;
        --code-border: #d1d9e0;
        --code-shadow: 0 1px 3px rgba(27, 31, 36, 0.08);
        --code-text: #24292f;
        --code-line-number: #7f7f7f;
        --code-line-highlight: #dedede;
        --code-error: #f6f8fa;
        --code-error-bg: #82071e;
        --code-keyword: #cf222e;
        --code-keyword-constant: #cf222e;
        --code-name: #1f2328;
        --code-name-builtin: #6639ba;
        --code-name-namespace: #24292e;
        --code-name-tag: #0550ae;
        --code-name-variable: #953800;
        --code-name-function: #6639ba;
        --code-name-decorator: #0550ae;
        --code-string: #0a3069;
        --code-string-symbol: #032f62;
        --code-number: #0550ae;
        --code-operator: #0550ae;
        --code-punctuation: #1f2328;
        --code-comment: #57606a;
        --code-deleted: #82071e;
        --code-deleted-bg: #ffebe9;
        --code-inserted: #116329;
        --code-inserted-bg: #dafbe1;
        color-scheme: light;
    }

    :root[data-theme="light"] {
        color-scheme: light;
    }

    :root[data-theme="dark"] {
        --bg-color-primary: #121212;
        --bg-color-secondary: #1c1f24;
        --text-color-primary: #e5e5e5;
        --text-color-secondary: #b3b3b7;
        --text-color-tertiary: #a0a0a0;
        --link-color: #6da6ff;
        --link-visited-color: #b388ff;
        --border-color: #30363d;
        --upvoted-color: #ff6b6b;
        --code-bg: #0d1117;
        --code-inline-bg: #161b22;
        --code-inline-text: #e6edf3;
        --code-border: #30363d;
        --code-shadow: 0 0 12px rgba(0, 0, 0, 0.4);
        --code-text: #e6edf3;
        --code-line-number: #6e7681;
        --code-line-highlight: #6e7681;
        --code-error: #f85149;
        --code-error-bg: transparent;
        --code-keyword: #ff7b72;
        --code-keyword-constant: #79c0ff;
        --code-name: #e6edf3;
        --code-name-builtin: #79c0ff;
        --code-name-namespace: #ff7b72;
        --code-name-tag: #7ee787;
        --code-name-variable: #79c0ff;
        --code-name-function: #d2a8ff;
        --code-name-decorator: #d2a8ff;
        --code-string: #a5d6ff;
        --code-string-symbol: #a5d6ff;
        --code-number: #a5d6ff;
        --code-operator: #ff7b72;
        --code-punctuation: #c9d1d9;
        --code-comment: #8b949e;
        --code-deleted: #ffa198;
        --code-deleted-bg: #490202;
        --code-inserted: #56d364;
        --code-inserted-bg: #0f5323;
        color-scheme: dark;
    }

    @media (prefers-color-scheme: dark) {
        :root:not([data-theme]) {
            --bg-color-primary: #121212;
            --bg-color-secondary: #1c1f24;
            --text-color-primary: #e5e5e5;
            --text-color-secondary: #b3b3b7;
            --text-color-tertiary: #a0a0a0;
            --link-color: #6da6ff;
            --link-visited-color: #b388ff;
            --border-color: #30363d;
            --upvoted-color: #ff6b6b;
            --code-bg: #0d1117;
            --code-inline-bg: #161b22;
            --code-inline-text: #e6edf3;
            --code-border: #30363d;
            --code-shadow: 0 0 12px rgba(0, 0, 0, 0.4);
            --code-text: #e6edf3;
            --code-line-number: #6e7681;
            --code-line-highlight: #6e7681;
            --code-error: #f85149;
            --code-error-bg: transparent;
            --code-keyword: #ff7b72;
            --code-keyword-constant: #79c0ff;
            --code-name: #e6edf3;
            --code-name-builtin: #79c0ff;
            --code-name-namespace: #ff7b72;
            --code-name-tag: #7ee787;
            --code-name-variable: #79c0ff;
            --code-name-function: #d2a8ff;
            --code-name-decorator: #d2a8ff;
            --code-string: #a5d6ff;
            --code-string-symbol: #a5d6ff;
            --code-number: #a5d6ff;
            --code-operator: #ff7b72;
            --code-punctuation: #c9d1d9;
            --code-comment: #8b949e;
            --code-deleted: #ffa198;
            --code-deleted-bg: #490202;
            --code-inserted: #56d364;
            --code-inserted-bg: #0f5323;
            color-scheme: dark;
        }
    }

    /* base */
    body {
        font-family: var(--font-primary),serif;
        font-size: var(--font-size-primary);
        margin: auto;
        padding: 20px;
        max-width: var(--width-max);
        text-align: left;
        background-color: var(--bg-color-primary);
        word-wrap: break-word;
        overflow-wrap: break-word;
        line-height: 1.5;
        color: var(--text-color-primary);
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    strong,
    b {
        color: var(--text-color-primary);
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
        margin: 16px 0;
    }

    a {
        color: var(--link-color);
        cursor: pointer;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }

    content {
        line-height: 1.6;
    }

    i {
        font-style: normal;
    }

    time {
        font-family: var(--font-secondary),serif;
        font-size: 15px;
    }

    .article-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.45rem;
        margin: -0.2rem 0 1rem;
        color: var(--text-color-secondary);
        font-size: 0.92em;
    }

    .article-meta span:last-child {
        font-family: var(--font-secondary),serif;
    }

    hr {
        border: 0;
        border-top: 1px dashed;
    }

    blockquote {
        border-left: 4px solid var(--border-color);
        color: var(--text-color-secondary);
        margin: 0;
        padding-left: 8px;
        font-style: normal;
    }

    blockquote p {
        margin: 0;
    }

    footer {
        padding: 25px 0;
        text-align: center;
        font-size: var(--font-size-secondary);
    }

    /* navigation */
    .title {
        text-decoration: none;
        border: 0;
    }

    .title:hover {
        text-decoration: none;
    }

    .title span {
        font-weight: 400;
    }

    nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
    }

    nav a {
        margin-right: 0;
        padding: 0.2rem 0.62rem;
        border: none;
        border-radius: 0;
        color: var(--link-color);
        position: relative;
        transition: color 0.2s ease;
    }

    nav a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -2px;
        width: 0;
        height: 2px;
        border-radius: 1px;
        background: linear-gradient(90deg, #5d8cc6, #cb7e60, #d8b45a, #5d8cc6);
        background-size: 300% 100%;
        animation: nav-underline-flow 3s linear infinite;
        transition: width 0.3s ease;
    }

    nav a.active::after,
    nav a:hover::after,
    nav a:focus-visible::after {
        width: 100%;
    }

    nav a.active {
        color: var(--link-color);
        background: none;
    }

    nav a:hover,
    nav a:focus-visible {
        text-decoration: none;
        color: var(--link-color);
        background: none;
    }

    @keyframes nav-underline-flow {
        0% { background-position: 0% 50%; }
        100% { background-position: 300% 50%; }
    }

    .loading-icon {
        display: inline-block;
        width: 0.7em;
        height: 0.7em;
        margin-left: 0.3em;
        vertical-align: baseline;
        position: relative;
        top: 0.05em;
        border: 2px solid currentColor;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 2s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .theme-toggle,
    button.upvote-btn {
        padding: 0;
        border: none;
        background: none;
        color: var(--text-color-primary);
        cursor: pointer;
    }

    .theme-toggle {
        width: 32px;
        height: 32px;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        opacity: 0.85;
        transition: background-color 0.2s ease, color 0.2s ease, opacity 0.2s ease;
    }

    .theme-toggle:hover,
    .theme-toggle:focus-visible {
        text-decoration: none;
        opacity: 1;
        background-color: var(--bg-color-secondary);
    }

    .theme-toggle svg {
        display: block;
    }

    .theme-toggle:focus-visible {
        outline: 2px solid var(--link-color);
        outline-offset: 2px;
        border-radius: 4px;
    }

    /* form and table */
    textarea {
        width: 100%;
        font-size: 16px;
    }

    input {
        font-size: 14px;
    }

    .section-filter-title {
        margin-bottom: 0;
    }

    .blog-search-input {
        margin-top: 16px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        border: 1px solid var(--border-color);
        border-radius: 4px;
    }

    th,
    td {
        border: 1px solid var(--border-color);
        padding: 4px;
    }

    th {
        background-color: var(--bg-color-secondary);
    }

    /* image */
    img {
        max-width: 100%;
        display: block;
        margin-left: auto;
        margin-right: auto;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        content-visibility: auto;
    }

    img[src*="#minipic"] {
        max-width: 50%;
        margin-left: 0;
        margin-right: auto;
    }

    .image-caption {
        margin: auto;
    }

    .image-caption figcaption {
        text-align: center;
        font-style: italic;
        font-size: 0.8em;
        margin-top: 0.6em;
        color: var(--text-color-secondary);
    }

    .home-hero-image {
        margin: 0 0 10px;
    }

    .home-hero-image img {
        max-width: 180px;
        width: 100%;
        margin-left: 0;
        margin-right: 0;
        border: none;
        border-radius: 12px;
        box-shadow: none;
    }

    /* Home banner: gif + Travelling 同行 */
    .home-banner {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        margin: 0 0 10px;
    }

    .home-banner-img {
        max-width: 180px;
        width: 100%;
        margin: 0;
        border: none;
        border-radius: 12px;
        box-shadow: none;
    }

    .home-banner-traveling,
    .home-banner-traveling:hover {
        font-size: 1em;
        white-space: nowrap;
        text-decoration: none;
        color: var(--link-color);
        align-self: flex-end;
        padding-bottom: 4px;
    }

    /* Home contact icons */
    .home-contact {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 16px;
    }

    .home-contact-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--link-color);
        text-decoration: none;
        font-size: .92em;
        transition: opacity 0.2s ease;
    }

    .home-contact-link:hover {
        opacity: .75;
        text-decoration: none;
    }

    .home-contact-link svg,
    .home-contact-link img {
        flex-shrink: 0;
        border: none;
        border-radius: 0;
    }

    /* code */
    code {
        font-family: var(--font-secondary),serif;
        background-color: var(--code-inline-bg);
        color: var(--code-inline-text);
        padding: 0.14em 0.38em;
        border-radius: 6px;
        border: 1px solid var(--code-border);
        font-size: 0.94em;
    }

    pre {
        margin: 1.2rem 0;
    }

    pre code {
        display: block;
        padding: 18px 20px;
        white-space: pre;
        overflow-x: auto;
        line-height: 1.65;
        border: none;
        border-radius: 14px;
        background-color: transparent;
        color: inherit;
        font-size: 0.92em;
        box-shadow: none;
    }

    div.highlight {
        margin: 1.3rem 0;
        border: 1px solid var(--code-border);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: var(--code-shadow);
    }

    div.highlight,
    div.highlight pre,
    .chroma {
        background: var(--code-bg);
    }

    div.highlight pre {
        margin: 0;
        padding: 0;
    }

    div.highlight code,
    .chroma {
        color: var(--code-text);
    }

    .chroma .err {
        color: var(--code-error);
        background-color: var(--code-error-bg);
    }

    .chroma .hl {
        background-color: var(--code-line-highlight);
    }

    .chroma .ln,
    .chroma .lnt {
        color: var(--code-line-number);
    }

    .chroma .k,
    .chroma .kd,
    .chroma .kn,
    .chroma .kr,
    .chroma .kt {
        color: var(--code-keyword);
    }

    .chroma .kc,
    .chroma .kp {
        color: var(--code-keyword-constant);
    }

    .chroma .na,
    .chroma .nc,
    .chroma .nx {
        color: var(--code-name);
    }

    .chroma .nb,
    .chroma .no,
    .chroma .nl,
    .chroma .py,
    .chroma .nv,
    .chroma .vc,
    .chroma .vg,
    .chroma .vi,
    .chroma .vm {
        color: var(--code-name-builtin);
    }

    .chroma .nd,
    .chroma .nf,
    .chroma .fm {
        color: var(--code-name-function);
    }

    .chroma .nn {
        color: var(--code-name-namespace);
    }

    .chroma .nt {
        color: var(--code-name-tag);
    }

    .chroma .s,
    .chroma .sa,
    .chroma .sb,
    .chroma .sc,
    .chroma .dl,
    .chroma .sd,
    .chroma .s2,
    .chroma .se,
    .chroma .sh,
    .chroma .si,
    .chroma .sx,
    .chroma .sr,
    .chroma .s1 {
        color: var(--code-string);
    }

    .chroma .ss {
        color: var(--code-string-symbol);
    }

    .chroma .m,
    .chroma .mb,
    .chroma .mf,
    .chroma .mh,
    .chroma .mi,
    .chroma .il,
    .chroma .mo,
    .chroma .l,
    .chroma .ld {
        color: var(--code-number);
    }

    .chroma .o,
    .chroma .ow,
    .chroma .or {
        color: var(--code-operator);
    }

    .chroma .p {
        color: var(--code-punctuation);
    }

    .chroma .c,
    .chroma .ch,
    .chroma .cm,
    .chroma .c1,
    .chroma .cs,
    .chroma .cp,
    .chroma .cpf,
    .chroma .go,
    .chroma .gp {
        color: var(--code-comment);
    }

    .chroma .gd {
        color: var(--code-deleted);
        background-color: var(--code-deleted-bg);
    }

    .chroma .gi {
        color: var(--code-inserted);
        background-color: var(--code-inserted-bg);
    }

    /* list */
    ul li:has(input) {
        list-style-type: none;
        margin-left: -25.5px;
    }

    /* blog post list */
    .blog-posts-by-year {
        display: grid;
        gap: 12px;
    }

    .blog-post-group {
        margin: 0;
    }

    .blog-post-year {
        margin-bottom: 8px;
    }

    ul.blog-posts {
        list-style-type: none;
        padding: 0;
        margin: 0;
    }

    .blog-post-item {
        display: flex;
    }

    .blog-post-item span {
        flex: 0 0 130px;
    }

    .blog-post-item span.grouped {
        flex: 0 0 80px;
    }

    .blog-post-link:visited {
        color: var(--link-visited-color);
    }

    /* TOC */
    div.toc {
        position: fixed;
        top: 50%;
        left: calc(
                (100vw + var(--width-max)) / 2
        );
        transform: translateY(-50%);
        width: calc((90vw - var(--width-max)) / 2);
        max-height: 80vh;
        overflow-y: auto;
        border: none;
        padding: 0;
        margin: 0;
        z-index: 99;
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    div.toc::-webkit-scrollbar {
        display: none;
    }

    .toc-nav {
        padding: 1.5rem;
    }

    .toc-nav ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .toc-nav li {
        margin: 8px 0;
    }

    .toc-nav a {
        display: block;
        text-decoration: none;
        color: transparent;
        padding: 0 12px;
        transition: all 0.2s ease;
        font-size: 0.9rem;
        line-height: 1.4;
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
    }

    .toc-nav:hover a {
        color: var(--text-color-tertiary);
    }

    .toc-nav a::before {
        content: "";
        display: inline-block;
        width: 16px;
        height: 4px;
        background-color: var(--text-color-tertiary);
        border-radius: 16px;
        margin-right: 12px;
        vertical-align: middle;
    }

    .toc-nav ul ul a::before {
        width: 12px;
        margin-right: 16px;
    }

    .toc-nav ul ul ul a::before {
        width: 8px;
        margin-right: 20px;
    }

    .toc-nav a.active,
    .toc-nav a:hover {
        color: var(--text-color-primary);
    }

    .toc-nav a.active::before,
    .toc-nav a:hover::before {
        background-color: var(--text-color-primary);
    }

    /* upvote */
    button.upvote-btn {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    button.upvote-btn:disabled {
        cursor: wait;
        opacity: 0.7;
    }

    button.upvoted {
        color: var(--upvoted-color);
    }

    span.upvote-count {
        margin-top: -4px;
        font-size: smaller;
    }

    .upvote-status {
        display: block;
        margin-top: 8px;
        color: var(--text-color-secondary);
        min-height: 1.2em;
    }

    /* image zoom */
    body:has(.image-zoom-toggle:checked) {
        overflow: hidden;
    }

    .image-zoom-container {
        position: relative;
        display: block;
    }

    .image-zoom-toggle {
        display: none;
    }

    .image-zoom-label {
        cursor: zoom-in;
        display: block;
        position: relative;
    }

    .image-zoom-label:focus {
        outline: 2px solid var(--link-color);
        outline-offset: 2px;
    }

    .zoomable-image {
        transition: transform 0.3s ease;
    }

    .image-zoom-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 20px;
        margin: 0;
    }

    .image-zoom-toggle:checked ~ .image-zoom-overlay {
        display: flex;
        cursor: zoom-out;
    }

    .image-zoom-toggle:checked ~ .image-zoom-label {
        cursor: default;
    }

    .image-zoom-toggle:checked ~ .image-zoom-overlay .zoomable-image {
        max-width: 90vw;
        max-height: 90vh;
        width: auto;
        height: auto;
        transform: scale(1);
        border: none;
        border-radius: 8px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        margin-left: auto !important;
        margin-right: auto !important;
    }

    .image-zoom-toggle:checked ~ .image-zoom-overlay::before {
        content: "";
        position: absolute;
        top: 20px;
        right: 20px;
        width: 32px;
        height: 32px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 50%;
        cursor: pointer;
        z-index: 1001;
    }

    .image-zoom-toggle:checked ~ .image-zoom-overlay::after {
        content: "✕";
        position: absolute;
        top: 20px;
        right: 20px;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: bold;
        color: #000;
        cursor: pointer;
        z-index: 1002;
    }

    .image-zoom-toggle:checked ~ .image-zoom-overlay figcaption {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 8px 16px;
        border-radius: 4px;
        font-size: 14px;
        z-index: 1001;
        max-width: 80vw;
        text-align: center;
    }

    /* responsive */
    @media (max-width: 800px) {
        img[src*="#minipic"] {
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
        }

        div.toc {
            display: none;
        }

        .image-zoom-label {
            cursor: pointer;
        }

        .image-zoom-toggle:checked ~ .image-zoom-overlay {
            padding: 10px;
        }

        .image-zoom-toggle:checked ~ .image-zoom-overlay::before,

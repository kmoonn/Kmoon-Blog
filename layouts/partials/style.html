<style>
    /* light theme */
    :root {
        --width-max: 720px;
        --font-primary: Verdana, sans-serif;
        --font-secondary: monospace;
        --font-size-primary: 1em;
        --font-size-secondary: 0.8em;
        --bg-color-primary: #fdfdfd;
        --bg-color-secondary: #f2f4f7;
        --text-color-primary: #1a1a1a;
        --text-color-secondary: #444;
        --text-color-tertiary: #8c8c8c;
        --link-color: #0066cc;
        --link-visited-color: #551a8b;
        --border-color: #d0d7de;
        --upvoted-color: #fa8072;
        --code-bg: #f6f8fb;
        --code-inline-bg: #eef2f7;
        --code-inline-text: #1f2937;
        --code-border: #d8e1ea;
        --code-gutter-bg: #eef2f6;
        --code-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
        --code-text: #24292f;
        --code-comment: #6b7280;
        --code-keyword: #8b1e54;
        --code-string: #0f766e;
        --code-number: #b45309;
        --code-function: #1d4ed8;
        --code-type: #7c3aed;
        --code-operator: #475467;
        color-scheme: light;
    }

    :root[data-theme="light"] {
        color-scheme: light;
    }

    :root[data-theme="dark"] {
        --bg-color-primary: #121212;
        --bg-color-secondary: #1c1f24;
        --text-color-primary: #e5e5e5;
        --text-color-secondary: #b3b3b7;
        --text-color-tertiary: #a0a0a0;
        --link-color: #6da6ff;
        --link-visited-color: #b388ff;
        --border-color: #30363d;
        --upvoted-color: #ff6b6b;
        --code-bg: #161b22;
        --code-inline-bg: #232b36;
        --code-inline-text: #e6edf3;
        --code-border: #2d3743;
        --code-gutter-bg: #1b2430;
        --code-shadow: 0 14px 32px rgba(0, 0, 0, 0.35);
        --code-text: #dce6f2;
        --code-comment: #8b949e;
        --code-keyword: #ff7ab8;
        --code-string: #7ee787;
        --code-number: #f6bd60;
        --code-function: #79c0ff;
        --code-type: #d2a8ff;
        --code-operator: #c9d1d9;
        color-scheme: dark;
    }

    @media (prefers-color-scheme: dark) {
        /* dark theme */
        :root:not([data-theme]) {
            --bg-color-primary: #121212;
            --bg-color-secondary: #1c1f24;
            --text-color-primary: #e5e5e5;
            --text-color-secondary: #b3b3b7;
            --text-color-tertiary: #a0a0a0;
            --link-color: #6da6ff;
            --link-visited-color: #b388ff;
            --border-color: #30363d;
            --upvoted-color: #ff6b6b;
            --code-bg: #161b22;
            --code-inline-bg: #232b36;
            --code-inline-text: #e6edf3;
            --code-border: #2d3743;
            --code-gutter-bg: #1b2430;
            --code-shadow: 0 14px 32px rgba(0, 0, 0, 0.35);
            --code-text: #dce6f2;
            --code-comment: #8b949e;
            --code-keyword: #ff7ab8;
            --code-string: #7ee787;
            --code-number: #f6bd60;
            --code-function: #79c0ff;
            --code-type: #d2a8ff;
            --code-operator: #c9d1d9;
            color-scheme: dark;
        }
    }

    body {
        font-family: var(--font-primary),serif;
        font-size: var(--font-size-primary);
        margin: auto;
        padding: 20px;
        max-width: var(--width-max);
        text-align: left;
        background-color: var(--bg-color-primary);
        word-wrap: break-word;
        overflow-wrap: break-word;
        line-height: 1.5;
        color: var(--text-color-primary);
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    strong,
    b {
        color: var(--text-color-primary);
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
        margin: 16px 0;
    }

    a {
        color: var(--link-color);
        cursor: pointer;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }

    .title {
        text-decoration: none;
        border: 0;
    }

    .title:hover {
        text-decoration: none;
    }

    .title span {
        font-weight: 400;
    }

    nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
    }

    nav a {
        margin-right: 0;
    }

    .theme-toggle {
        width: 28px;
        height: 28px;
        padding: 0;
        border: none;
        background: none;
        color: var(--text-color-primary);
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        opacity: 0.85;
    }

    .theme-toggle:hover {
        text-decoration: none;
        opacity: 1;
    }

    .theme-toggle svg {
        display: block;
    }

    .theme-toggle:focus-visible {
        outline: 2px solid var(--link-color);
        outline-offset: 2px;
        border-radius: 4px;
    }

    textarea {
        width: 100%;
        font-size: 16px;
    }

    input {
        font-size: 14px;
    }

    .section-filter-title {
        margin-bottom: 0;
    }

    .blog-search-input {
        margin-top: 16px;
    }

    content {
        line-height: 1.6;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        border: 1px solid var(--border-color);
        border-radius: 4px;
    }

    th,
    td {
        border: 1px solid var(--border-color);
        padding: 4px;
    }

    th {
        background-color: var(--bg-color-secondary);
    }

    hr {
        border: 0;
        border-top: 1px dashed;
    }

    img {
        max-width: 100%;
        display: block;
        margin-left: auto;
        margin-right: auto;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        content-visibility: auto;
    }

    img[src*="#minipic"] {
        max-width: 50%;
        margin-left: 0;
        margin-right: auto;
    }

    .image-caption figcaption {
        text-align: center;
        font-style: italic;
        font-size: 0.8em;
        margin-top: 0.6em;
        color: var(--text-color-secondary);
    }

    .image-caption {
        margin: auto;
    }

    .home-hero-image {
        margin: 0 0 10px;
    }

    .home-hero-image img {
        max-width: 180px;
        width: 100%;
        margin-left: 0;
        margin-right: 0;
        border: none;
        border-radius: 12px;
        box-shadow: none;
    }

    i {
        font-style: normal;
    }

    time {
        font-family: var(--font-secondary),serif;
        font-size: 15px;
    }

    code {
        font-family: var(--font-secondary),serif;
        background-color: var(--code-inline-bg);
        color: var(--code-inline-text);
        padding: 0.14em 0.38em;
        border-radius: 6px;
        border: 1px solid var(--code-border);
        font-size: 0.94em;
    }

    pre {
        margin: 1.2rem 0;
    }

    pre code {
        display: block;
        padding: 18px 20px;
        white-space: pre;
        overflow-x: auto;
        line-height: 1.65;
        border: none;
        border-radius: 14px;
        background-color: transparent;
        color: inherit;
        font-size: 0.92em;
        box-shadow: none;
    }

    div.highlight {
        position: relative;
        margin: 1.3rem 0;
        border: 1px solid var(--code-border);
        border-radius: 16px;
        overflow: hidden;
        background: var(--code-bg);
        box-shadow: var(--code-shadow);
    }

    div.highlight pre {
        margin: 0;
        padding: 0;
        border-radius: 0;
        background: var(--code-bg);
    }

    div.highlight code {
        background-color: transparent;
        color: var(--code-text);
    }

    .chroma {
        background: var(--code-bg);
        color: var(--code-text);
    }

    .chroma .ln,
    .chroma .lnt,
    .chroma .lnlinks {
        color: var(--code-comment);
    }

    .chroma .line,
    .chroma .cl {
        display: flex;
    }

    .chroma .lntd:first-child,
    .chroma .lnt,
    .chroma .ln {
        background: var(--code-gutter-bg);
    }

    .chroma .lntd:first-child {
        border-right: 1px solid var(--code-border);
        padding-right: 0;
    }

    .chroma .lntd:last-child {
        width: 100%;
    }

    .chroma .hl {
        background: color-mix(in srgb, var(--code-keyword) 14%, transparent);
    }

    .chroma .c,
    .chroma .ch,
    .chroma .cm,
    .chroma .c1,
    .chroma .cs,
    .chroma .cp,
    .chroma .cpf {
        color: var(--code-comment);
    }

    .chroma .k,
    .chroma .kc,
    .chroma .kd,
    .chroma .kn,
    .chroma .kp,
    .chroma .kr,
    .chroma .kt,
    .chroma .ow {
        color: var(--code-keyword);
    }

    .chroma .s,
    .chroma .sa,
    .chroma .sb,
    .chroma .sc,
    .chroma .dl,
    .chroma .sd,
    .chroma .s2,
    .chroma .se,
    .chroma .sh,
    .chroma .si,
    .chroma .sx,
    .chroma .sr,
    .chroma .s1,
    .chroma .ss {
        color: var(--code-string);
    }

    .chroma .m,
    .chroma .mb,
    .chroma .mf,
    .chroma .mh,
    .chroma .mi,
    .chroma .il,
    .chroma .mo {
        color: var(--code-number);
    }

    .chroma .na,
    .chroma .nb,
    .chroma .bp,
    .chroma .nc,
    .chroma .nd,
    .chroma .ne,
    .chroma .nf,
    .chroma .fm,
    .chroma .nl,
    .chroma .nn,
    .chroma .nx,
    .chroma .py,
    .chroma .nt,
    .chroma .vc,
    .chroma .vg,
    .chroma .vi,
    .chroma .vm {
        color: var(--code-function);
    }

    .chroma .no,
    .chroma .nv,
    .chroma .vc,
    .chroma .vg,
    .chroma .vi,
    .chroma .vm {
        color: var(--code-type);
    }

    .chroma .o,
    .chroma .p,
    .chroma .err,
    .chroma .w {
        color: var(--code-operator);
    }

    .chroma .gd,
    .chroma .gr,
    .chroma .gt {
        color: #ff938a;
    }

    .chroma .gi,
    .chroma .gu {
        color: #8ef0b2;
    }

    .chroma .gl,
    .chroma .gh,
    .chroma .gs {
        font-weight: 600;
    }

    blockquote {
        border-left: 4px solid var(--border-color);
        color: var(--text-color-secondary);
        margin: 0;
        padding-left: 8px;
        font-style: normal;
    }

    blockquote p {
        margin: 0;
    }

    footer {
        padding: 25px 0;
        text-align: center;
        font-size: var(--font-size-secondary);
    }

    ul li:has(input) {
        list-style-type: none;
        margin-left: -25.5px;
    }

    /* blog post list */
    .blog-posts-by-year {
        display: grid;
        gap: 12px;
    }

    .blog-post-group {
        margin: 0;
    }

    .blog-post-year {
        margin-bottom: 8px;
    }

    ul.blog-posts {
        list-style-type: none;
        padding: 0;
        margin: 0;
    }

    .blog-post-item {
        display: flex;
    }

    .blog-post-item span {
        flex: 0 0 130px;
    }

    .blog-post-item span.grouped {
        flex: 0 0 80px;
    }

    .blog-post-link:visited {
        color: var(--link-visited-color);
    }

    /* TOC 样式 */
    div.toc {
        position: fixed; /* 固定定位 */
        top: 50%; /* 垂直居中 */
        left: calc(
                (100vw + var(--width-max)) / 2
        ); /* 水平定位，根据视口宽度和最大内容宽度计算 */
        transform: translateY(-50%); /* 垂直居中调整 */
        width: calc((90vw - var(--width-max)) / 2); /* 宽度计算 */
        max-height: 80vh; /* 最大高度为视口高度的80% */
        overflow-y: auto; /* 垂直方向内容溢出时显示滚动条 */
        border: none; /* 无边框 */
        padding: 0; /* 无内边距 */
        margin: 0; /* 无外边距 */
        z-index: 99; /* 设置堆叠顺序，确保在其他元素之上 */

        /* 隐藏滚动条 */
        -ms-overflow-style: none; /* IE 和 Edge 隐藏滚动条 */
        scrollbar-width: none; /* Firefox 隐藏滚动条 */
    }

    div.toc::-webkit-scrollbar {
        /* Webkit 浏览器（Chrome, Safari）滚动条样式 */
        display: none; /* 隐藏滚动条 */
    }

    .toc-nav {
        /* 目录导航容器样式 */
        padding: 1.5rem; /* 内边距 */
    }

    .toc-nav ul {
        /* 目录导航无序列表样式 */
        list-style: none; /* 移除列表项标记 */
        padding: 0; /* 移除内边距 */
        margin: 0; /* 移除外边距 */
    }

    .toc-nav li {
        /* 目录导航列表项样式 */
        margin: 8px 0; /* 上下外边距 */
    }

    .toc-nav a {
        /* 目录链接样式 */
        display: block; /* 块级显示 */
        text-decoration: none; /* 无下划线 */
        color: transparent; /* 默认透明 */
        padding: 0 12px; /* 内边距 */
        transition: all 0.2s ease; /* 所有属性过渡效果 */
        font-size: 0.9rem; /* 字体大小 */
        line-height: 1.4; /* 行高 */
        text-align: left; /* 文本左对齐 */
        white-space: nowrap; /* 禁止换行 */
        overflow: hidden; /* 隐藏溢出内容 */
        text-overflow: ellipsis; /* 显示省略号 */
        max-width: 100%; /* 限制最大宽度 */
    }

    .toc-nav:hover a {
        color: var(--text-color-tertiary); /* hover时显示文字颜色 */
    }

    .toc-nav a::before {
        /* 目录链接前的小横线样式 */
        content: ""; /* 生成内容 */
        display: inline-block; /* 行内块级显示 */
        width: 16px; /* 宽度 */
        height: 4px; /* 高度 */
        background-color: var(--text-color-tertiary);
        border-radius: 16px; /* 圆角 */
        margin-right: 12px; /* 右外边距 */
        vertical-align: middle; /* 垂直居中对齐 */
    }

    .toc-nav ul ul a::before {
        /* 二级目录链接前的小横线样式 */
        width: 12px; /* 显示宽度 */
        margin-right: 16px; /* 调整右外边距，使其与默认 a::before 占据的总宽度一致 (12px + 12px = 24px) */
    }

    .toc-nav ul ul ul a::before {
        /* 三级目录链接前的小横线样式 */
        width: 8px; /* 显示宽度 */
        margin-right: 20px; /* 调整右外边距，使其与默认 a::before 占据的总宽度一致 (8px + 16px = 24px) */
    }

    .toc-nav a.active,
    .toc-nav a:hover {
        text-decoration: none;
        color: var(--text-color-primary);
    }

    .toc-nav a.active::before,
    .toc-nav a:hover::before {
        background-color: var(--text-color-primary);
    }

    /* upvote button style */
    button.upvote-btn {
        margin: 0;
        padding: 0;
        border: none;
        background: none;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: var(--text-color-primary);
    }

    button.upvote-btn:disabled {
        cursor: wait;
        opacity: 0.7;
    }

    button.upvoted {
        color: var(--upvoted-color);
    }

    span.upvote-count {
        margin-top: -4px;
        font-size: smaller;
    }

    .upvote-status {
        display: block;
        margin-top: 8px;
        color: var(--text-color-secondary);
        min-height: 1.2em;
    }

    /* 图片放大功能 - CSS only */
    body:has(.image-zoom-toggle:checked) {
        overflow: hidden;
    }

    .image-zoom-container {
        position: relative;
        display: block;
    }

    .image-zoom-toggle {
        display: none;
    }

    .image-zoom-label {
        cursor: zoom-in;
        display: block;
        position: relative;
    }

    .image-zoom-label:focus {
        outline: 2px solid var(--link-color);
        outline-offset: 2px;
    }

    .zoomable-image {
        transition: transform 0.3s ease;
    }

    /* 放大overlay - 新建一个元素专门用于overlay */
    .image-zoom-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 20px;
        margin: 0;
    }

    .image-zoom-toggle:checked ~ .image-zoom-overlay {
        display: flex;
        cursor: zoom-out;
    }

    /* 确保原始label保持正常cursor */
    .image-zoom-toggle:checked ~ .image-zoom-label {
        cursor: default;
    }

    .image-zoom-toggle:checked ~ .image-zoom-overlay .zoomable-image {
        max-width: 90vw;
        max-height: 90vh;
        width: auto;
        height: auto;
        transform: scale(1);
        border: none;
        border-radius: 8px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        margin-left: auto !important;
        margin-right: auto !important;
    }

    .image-zoom-toggle:checked ~ .image-zoom-overlay::before {
        content: "";
        position: absolute;
        top: 20px;
        right: 20px;
        width: 32px;
        height: 32px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 50%;
        cursor: pointer;
        z-index: 1001;
    }

    .image-zoom-toggle:checked ~ .image-zoom-overlay::after {
        content: "✕";
        position: absolute;
        top: 20px;
        right: 20px;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: bold;
        color: #000;
        cursor: pointer;
        z-index: 1002;
    }

    .image-zoom-toggle:checked ~ .image-zoom-overlay figcaption {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 8px 16px;
        border-radius: 4px;
        font-size: 14px;
        z-index: 1001;
        max-width: 80vw;
        text-align: center;
    }

    /* 移动设备适配 */
    @media (max-width: 800px) {
        img[src*="#minipic"] {
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
        }

        div.toc {
            display: none;
        }

        .image-zoom-label {
            cursor: pointer;
        }

        .image-zoom-toggle:checked ~ .image-zoom-overlay {
            padding: 10px;
        }

        .image-zoom-toggle:checked ~ .image-zoom-overlay::before,
        .image-zoom-toggle:checked ~ .image-zoom-overlay::after {
            top: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            font-size: 16px;
        }

        .image-zoom-toggle:checked ~ .image-zoom-overlay figcaption {
            bottom: 10px;
            font-size: 12px;
            padding: 6px 12px;
        }
    }
</style>

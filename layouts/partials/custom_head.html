<!-- A partial to be overwritten by the user.
  Simply place a custom_head.html into
  your local /layouts/partials-directory -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@400;700&display=swap" rel="stylesheet">
<script>
  (function () {
    const themes = ['system', 'light', 'dark'];
    const icons = {
      system: '<svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"></path><path d="M12 3a9 9 0 1 0 0 18"></path><path d="M12 3a9 9 0 0 1 0 18"></path></svg>',
      light: '<svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2.5v3"></path><path d="M12 18.5v3"></path><path d="M21.5 12h-3"></path><path d="M5.5 12h-3"></path><path d="M18.7 5.3l-2.1 2.1"></path><path d="M7.4 16.6l-2.1 2.1"></path><path d="M18.7 18.7l-2.1-2.1"></path><path d="M7.4 7.4L5.3 5.3"></path></svg>',
      dark: '<svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"></path></svg>'
    };

    function getStoredTheme() {
      try {
        const theme = localStorage.getItem('theme');
        return themes.includes(theme) ? theme : 'system';
      } catch (error) {
        return 'system';
      }
    }

    function applyTheme(theme) {
      if (theme === 'light' || theme === 'dark') {
        document.documentElement.dataset.theme = theme;
      } else {
        delete document.documentElement.dataset.theme;
      }
    }

    function renderTheme(theme, themeToggle) {
      if (!themeToggle) {
        return;
      }

      const label = theme.charAt(0).toUpperCase() + theme.slice(1);
      themeToggle.innerHTML = icons[theme] || icons.system;
      themeToggle.setAttribute('aria-label', 'Theme: ' + label);
      themeToggle.setAttribute('title', 'Theme: ' + label);
      themeToggle.dataset.theme = theme;
    }

    function persistTheme(theme) {
      try {
        if (theme === 'system') {
          localStorage.removeItem('theme');
        } else {
          localStorage.setItem('theme', theme);
        }
      } catch (error) {
        return;
      }
    }

    function nextTheme(theme) {
      const index = themes.indexOf(theme);
      return themes[(index + 1) % themes.length];
    }

    const initialTheme = getStoredTheme();
    applyTheme(initialTheme);

    document.addEventListener('DOMContentLoaded', function () {
      const themeToggle = document.querySelector('[data-theme-toggle]');
      if (!themeToggle) return;

      let currentTheme = getStoredTheme();
      applyTheme(currentTheme);
      renderTheme(currentTheme, themeToggle);

      themeToggle.addEventListener('click', function () {
        currentTheme = nextTheme(currentTheme);
        persistTheme(currentTheme);
        applyTheme(currentTheme);
        renderTheme(currentTheme, themeToggle);
      });
    });
  })();
</script>
